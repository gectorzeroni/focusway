<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer / Metronome</title>
    <link rel="icon" href="./Favicon%20pack/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./Favicon%20pack/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./Favicon%20pack/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="./Favicon%20pack/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=chart-panel-updates" />
  </head>
  <body>
    <main class="app" aria-label="Timer and sound workspace">
      <section class="performance-bar" aria-label="Performance hours feature">
        <div class="performance-tally">
          <button class="tally-remove" id="tally-remove" type="button" aria-label="Remove latest performance mark"></button>
          <button class="tally-button" id="tally-button" type="button" aria-label="Add performance mark">
            <span class="tally-empty" id="tally-empty">Click to add tick</span>
            <svg class="tally-board" id="tally-board" viewBox="0 0 360 64" preserveAspectRatio="xMinYMid meet" role="img" aria-label="Performance marks"></svg>
          </button>
        </div>

        <time class="performance-date" id="performance-date"></time>

        <button class="mini-chart-button" id="mini-chart-button" type="button" aria-label="Open performance hours chart">
          <svg class="mini-chart" id="mini-chart" viewBox="0 0 220 64" preserveAspectRatio="xMaxYMid meet" aria-hidden="true"></svg>
        </button>
      </section>

      <section class="pane timer-pane" aria-labelledby="timer-title">
        <svg class="timer-progress" aria-hidden="true">
          <path class="timer-progress-track" />
          <path class="timer-progress-line" />
        </svg>

        <header class="pane-header">
          <h1 id="timer-title">Timer</h1>
          <span class="status" id="timer-status">Ready</span>
        </header>

        <div
          class="readout timer-editor"
          id="timer-display"
          role="textbox"
          aria-label="Timer duration"
          aria-live="polite"
          aria-multiline="false"
          contenteditable="true"
          inputmode="numeric"
          spellcheck="false"
        >30:00</div>

        <div class="preset-tabs" role="tablist" aria-label="Timer presets">
          <button class="preset-tab" type="button" data-preset-minutes="5">5 min</button>
          <button class="preset-tab" type="button" data-preset-minutes="10">10 min</button>
          <button class="preset-tab" type="button" data-preset-minutes="30">30 min</button>
        </div>

        <div class="stepper" aria-label="Adjust timer minutes">
          <button class="icon-button" id="timer-minus" type="button" aria-label="Subtract one minute">−</button>
          <span>Minutes</span>
          <button class="icon-button" id="timer-plus" type="button" aria-label="Add one minute">+</button>
        </div>

        <footer class="controls">
          <button class="control play-toggle" id="timer-toggle" type="button" aria-label="Start timer" aria-pressed="false">
            <span class="symbol" aria-hidden="true">
              <span class="symbol-icon play-icon"></span>
              <span class="symbol-icon pause-icon"></span>
            </span>
            <span class="control-label">Start</span>
          </button>
          <button class="control" id="timer-reset" type="button" aria-label="Reset timer">
            <span class="symbol" aria-hidden="true">↻</span>
            <span class="control-label">Reset</span>
          </button>
        </footer>
      </section>

      <section class="pane metronome-pane" aria-labelledby="sound-title">
        <header class="pane-header">
          <h1 id="sound-title">Sound</h1>
          <span class="status" id="metro-status">Silent</span>
        </header>

        <div class="mode-switch" role="tablist" aria-label="Sound source">
          <button class="mode-button is-selected" id="metronome-tab" type="button" role="tab" aria-selected="true" aria-controls="metronome-panel" data-sound-mode="metronome">Metronome</button>
          <button class="mode-button" id="music-tab" type="button" role="tab" aria-selected="false" aria-controls="music-panel" data-sound-mode="music">Music</button>
        </div>

        <div class="sound-panel is-selected" id="metronome-panel" role="tabpanel" aria-labelledby="metronome-tab">
          <span class="bpm-label">BPM</span>
          <div class="bpm-wrap">
            <input id="bpm-input" class="bpm-input" type="number" min="20" max="240" value="120" aria-label="Beats per minute" />
          </div>

          <div class="tempo-control" aria-label="Adjust tempo">
            <button class="icon-button" id="bpm-minus" type="button" aria-label="Decrease tempo">−</button>
            <input id="bpm-slider" type="range" min="20" max="240" value="120" />
            <button class="icon-button" id="bpm-plus" type="button" aria-label="Increase tempo">+</button>
          </div>

          <div class="beats" aria-label="Beat indicator">
            <div class="beat active"><span></span><small>1</small></div>
            <div class="beat"><span></span><small>2</small></div>
            <div class="beat"><span></span><small>3</small></div>
            <div class="beat"><span></span><small>4</small></div>
            <div class="beat"><span></span><small>5</small></div>
            <div class="beat"><span></span><small>6</small></div>
            <div class="beat"><span></span><small>7</small></div>
            <div class="beat"><span></span><small>8</small></div>
          </div>

          <footer class="controls metro-controls">
            <button class="control play-toggle" id="metro-toggle" type="button" aria-label="Start metronome" aria-pressed="false">
              <span class="symbol" aria-hidden="true">
                <span class="symbol-icon play-icon"></span>
                <span class="symbol-icon pause-icon"></span>
              </span>
              <span class="control-label">Start</span>
            </button>
          </footer>
        </div>

        <div class="sound-panel music-panel" id="music-panel" role="tabpanel" aria-labelledby="music-tab" hidden>
          <div class="spotify-stage">
            <iframe
              id="spotify-frame"
              title="Spotify player"
              src="https://open.spotify.com/embed/track/6rqhFgbbKwnb9MLmUQDhG6?utm_source=generator"
              width="100%"
              height="352"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"
            ></iframe>
          </div>

          <form class="spotify-form" id="spotify-form">
            <label>
              <span>Spotify URL</span>
              <input id="spotify-input" type="url" inputmode="url" placeholder="https://open.spotify.com/..." autocomplete="off" />
            </label>
            <button class="load-button" type="submit">Load</button>
          </form>
        </div>
      </section>
    </main>

    <div class="chart-modal" id="chart-modal" hidden>
      <div class="chart-dialog" role="dialog" aria-modal="true" aria-labelledby="chart-title">
        <header class="chart-header">
          <div>
            <h2 id="chart-title">Performance hours feature</h2>
            <span id="chart-subtitle">Today</span>
          </div>
          <button class="chart-close" id="chart-close" type="button" aria-label="Close chart"></button>
        </header>

        <div class="chart-summary">
          <strong id="chart-total">0</strong>
          <label class="chart-range" for="chart-range-select">
            <select id="chart-range-select" aria-label="Performance range">
              <option value="today">Today</option>
              <option value="previous">Previous day</option>
              <option value="last5">Last 5 days</option>
              <option value="last30">Last 30 days</option>
            </select>
          </label>
        </div>
        <svg class="large-chart" id="large-chart" viewBox="0 0 720 300" role="img" aria-label="Performance marks by hour"></svg>
        <section class="chart-history" aria-labelledby="chart-history-title">
          <h3 id="chart-history-title">History</h3>
          <div class="chart-history-list" id="chart-history-list"></div>
        </section>
      </div>
    </div>

    <script src="./app.js?v=chart-panel-updates"></script>
  </body>
</html>
